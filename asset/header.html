<header>
  <div class="container">
    <div class="header-top-row">
      <img src="/barng.github.io/asset/self_picture.png" alt="Profile Picture" class="profile-pic">

      <nav>
        <ul>
          <li><a href="/barng.github.io/index.html" id="home-link">Home</a></li>
          <li><a href="/barng.github.io/pages/education.html" id="education-link">Education</a></li>
          <li><a href="/barng.github.io/pages/skill.html" id="skills-link">Skills</a></li>
          <li><a href="/barng.github.io/pages/experience.html" id="experience-link">Experiences</a></li>
          <li><a href="/barng.github.io/pages/projects.html" id="projects-link">Projects</a></li>
          <li><a href="/barng.github.io/pages/references.html" id="references-link">References</a></li>
          <li><a href="/barng.github.io/pages/sub_job.html" id="others-link">Others</a></li>
        </ul>
      </nav>
    </div>

    <div id="language-switcher">
      <select onchange="handleLanguageChange(this.value)" style="padding: 8px; font-size: 14px;">
        <option value="en">English</option>
        <option value="jp">日本語</option>
        <option value="kr">한국어</option>
      </select>
    </div>
  </div>
</header>

<script>
  const headerLanguageData = {
    en: { home: "Home", education: "Education", skills: "Skills", experience: "Experiences", projects: "Projects", references: "References", others: "Others" },
    jp: { home: "ホーム", education: "学歴", skills: "スキル", experience: "職歴", projects: "プロジェクト", references: "参考文献", others: "その他" },
    kr: { home: "홈", education: "학력", skills: "스킬", experience: "직무경험", projects: "프로젝트", references: "기타활동", others: "기타" }
  };

  function applyLanguage(lang) {
    if (!headerLanguageData[lang]) return;

    document.getElementById('home-link').textContent = headerLanguageData[lang].home;
    document.getElementById('education-link').textContent = headerLanguageData[lang].education;
    document.getElementById('skills-link').textContent = headerLanguageData[lang].skills;
    document.getElementById('experience-link').textContent = headerLanguageData[lang].experience;
    document.getElementById('projects-link').textContent = headerLanguageData[lang].projects;
    document.getElementById('references-link').textContent = headerLanguageData[lang].references;
    document.getElementById('others-link').textContent = headerLanguageData[lang].others;
  }

  function handleLanguageChange(lang) {
    applyLanguage(lang);
    localStorage.setItem('selectedLanguage', lang);
  }

  function initializeHeaderLanguage() {
    const savedLang = localStorage.getItem('selectedLanguage') || 'en';
    const selectElement = document.querySelector('#language-switcher select');

    if (selectElement) {
      selectElement.value = savedLang;
      applyLanguage(savedLang);
    }
  }

  initializeHeaderLanguage();
</script>
